spring:
  application:
    name: app
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:yourdb}
    username: ${DB_USER:youruser}
    password: ${DB_PASS:yourpass}

  liquibase:
    drop-first: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
    elasticsearch:
      repositories:
        enabled: true

  elasticsearch:
    uris: http://${ES_HOST:localhost}:9200

  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: 6c1a3f3038396b
    password: 4ea420ec71d4cc
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  show-actuator: false
security:              # ← root level, not spring.security
  jwt:
    secret-key: mUGb5N9TSTM0tQD8fzwYnuf8dAtW3n/g+MoKbH+ztDY=
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
logging:
  level:
    org.springframework.security: DEBUG
    com.e_commerce: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized